<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management | RentEase Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/animations.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <script src="../../js/admin-guard.js"></script>

    <style>
        body { background: var(--color-bg); display: flex; min-height: 100vh; }
        
        .admin-sidebar { 
            width: var(--sidebar-width); 
            background: #0F172A; 
            display: flex; 
            flex-direction: column; 
            position: fixed; 
            height: 100vh; 
            z-index: var(--z-sticky); 
            color: white;
            padding: var(--space-8) 0;
        }

        .admin-logo { padding: 0 var(--space-8) var(--space-8); border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: var(--space-8); display: flex; align-items: center; gap: 12px; font-family: var(--font-display); }
        .admin-badge { background: var(--color-accent); color: #0F172A; font-size: 0.65rem; padding: 2px 8px; border-radius: var(--radius-sm); font-weight: 800; }

        .nav-list { list-style: none; flex-grow: 1; padding: 0 var(--space-4); }
        .nav-item { display: flex; align-items: center; gap: var(--space-4); padding: var(--space-4) var(--space-6); color: rgba(255,255,255,0.6); border-radius: var(--radius-md); transition: all var(--transition-fast); margin-bottom: var(--space-1); font-weight: 500; text-decoration: none; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(255,255,255,0.1); color: var(--color-accent); font-weight: 700; border-left: 4px solid var(--color-accent); }

        .admin-main { margin-left: var(--sidebar-width); flex-grow: 1; padding: var(--space-12); max-width: 1400px; }
        
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th { text-align: left; padding: 16px; border-bottom: 1px solid var(--color-border); color: var(--color-text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .admin-table td { padding: 16px; border-bottom: 1px solid var(--color-surface-2); font-size: 0.9rem; }

        .role-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .role-admin { background: #fee2e2; color: #ef4444; }
        .role-vendor { background: #fef3c7; color: #d97706; }
        .role-customer { background: #dcfce7; color: #16a34a; }

        @media (max-width: 1024px) {
            .admin-main { margin-left: 0; }
            .admin-sidebar { display: none; }
        }
    </style>
</head>
<body>

    <aside class="admin-sidebar">
        <div class="admin-logo">
            <span>RentEase</span>
            <span class="admin-badge">ADMIN</span>
        </div>
        <nav class="nav-list">
            <a href="/pages/admin/dashboard.html" class="nav-item">📊 Dashboard</a>
            <a href="/pages/admin/products.html" class="nav-item">🪑 Products</a>
            <a href="/pages/admin/orders.html" class="nav-item">📦 Orders</a>
            <a href="/pages/profile.html" class="nav-item">👤 My Profile</a>
            <a href="/pages/admin/users.html" class="nav-item active">👥 Users</a>
            <a href="/pages/admin/maintenance.html" class="nav-item">🛠️ Maintenance</a>
            <a href="/pages/admin/settings.html" class="nav-item">⚙️ Settings</a>
        </nav>
        <div style="padding: var(--space-6);">
            <button class="btn btn-outline w-100" style="width: 100%; color: white; border-color: rgba(255,255,255,0.2);" onclick="Auth.logout()">Logout</button>
        </div>
    </aside>

    <main class="admin-main">
        <div class="flex-between mb-10">
            <div>
                <h1 style="font-family: var(--font-display);">User Management</h1>
                <p class="text-muted">Manage platform users, vendors, and roles</p>
            </div>
            <div class="flex-start gap-4">
                <input type="text" id="userSearch" class="form-control" placeholder="Search by name or email..." style="width: 300px;" oninput="fetchUsers()">
                <select id="roleFilter" class="form-control" style="width: 150px;" onchange="fetchUsers()">
                    <option value="">All Roles</option>
                    <option value="customer">Customers</option>
                    <option value="vendor">Vendors</option>
                    <option value="admin">Admins</option>
                </select>
            </div>
        </div>

        <div class="card p-0" style="overflow: hidden;">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Joined Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
        
        <div class="flex-center mt-8 gap-4" id="pagination">
            <!-- Pagination -->
        </div>
    </main>

    <script src="../../js/api.js"></script>
    <script src="../../js/toast.js"></script>
    <script src="../../js/loader.js"></script>
    <script src="../../js/auth.js"></script>

    <script>
        let currentPage = 1;

        async function fetchUsers() {
            try {
                const search = document.getElementById('userSearch').value;
                const role = document.getElementById('roleFilter').value;
                
                const res = await API.get(`/admin/users?page=${currentPage}&search=${search}&role=${role}`);
                const { users, totalPages } = res.data;

                const table = document.getElementById('usersTable');
                table.innerHTML = users.map(user => `
                    <tr>
                        <td>
                            <div class="font-bold">${user.name}</div>
                            <div class="text-muted" style="font-size: 0.75rem;">ID: ${user._id}</div>
                        </td>
                        <td>${user.email}</td>
                        <td>
                            <select class="form-control form-control-sm" style="width: 120px;" onchange="updateRole('${user._id}', this.value)">
                                <option value="customer" ${user.role === 'customer' ? 'selected' : ''}>Customer</option>
                                <option value="vendor" ${user.role === 'vendor' ? 'selected' : ''}>Vendor</option>
                                <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                            </select>
                        </td>
                        <td class="text-muted">${new Date(user.createdAt).toLocaleDateString()}</td>
                        <td>
                            <div class="flex-start gap-2">
                                <button class="btn btn-ghost btn-sm text-danger" onclick="deleteUser('${user._id}')">Delete</button>
                            </div>
                        </td>
                    </tr>
                `).join('');

                renderPagination(totalPages);
            } catch (err) {
                Toast.error('Failed to load users');
            }
        }

        async function updateRole(userId, newRole) {
            try {
                if (!confirm(`Are you sure you want to change this user's role to ${newRole}?`)) return fetchUsers();
                
                await API.put(`/admin/users/${userId}/role`, { role: newRole });
                Toast.success('User role updated');
                fetchUsers();
            } catch (err) {
                Toast.error(err.response?.data?.message || 'Failed to update role');
                fetchUsers();
            }
        }

        async function deleteUser(userId) {
            if (!confirm('Are you sure? This action cannot be undone.')) return;
            try {
                await API.delete(`/admin/users/${userId}`);
                Toast.success('User deleted');
                fetchUsers();
            } catch (err) {
                Toast.error('Failed to delete user');
            }
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="btn ${i === currentPage ? 'btn-primary' : 'btn-ghost'} btn-sm" onclick="goToPage(${i})">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            fetchUsers();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await Auth.init(); // Ensure user is logged in
            fetchUsers();
        });
    </script>
</body>
</html>
