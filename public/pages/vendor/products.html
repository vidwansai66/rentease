<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products | RentEase Vendor</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/animations.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <script src="../../js/vendor-guard.js"></script>

    <style>
        body { background: var(--color-bg); display: flex; min-height: 100vh; }
        
        .vendor-sidebar { 
            width: var(--sidebar-width); 
            background: #1E293B; 
            display: flex; 
            flex-direction: column; 
            position: fixed; 
            height: 100vh; 
            z-index: var(--z-sticky); 
            color: white;
            padding: var(--space-8) 0;
        }

        .vendor-logo { 
            padding: 0 var(--space-8) var(--space-8); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            margin-bottom: var(--space-8); 
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-display);
        }

        .vendor-badge { 
            background: var(--color-secondary); 
            color: white; 
            font-size: 0.65rem; 
            padding: 2px 8px; 
            border-radius: var(--radius-sm); 
            font-weight: 800; 
        }

        .nav-list { list-style: none; flex-grow: 1; padding: 0 var(--space-4); }
        .nav-item { 
            display: flex; 
            align-items: center; 
            gap: var(--space-4); 
            padding: var(--space-4) var(--space-6); 
            color: rgba(255,255,255,0.6); 
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            margin-bottom: var(--space-1);
            font-weight: 500;
            text-decoration: none;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--color-secondary); color: white; box-shadow: var(--shadow-md); }

        .vendor-main { 
            margin-left: var(--sidebar-width); 
            flex-grow: 1; 
            padding: var(--space-12); 
            max-width: 1400px;
        }

        .product-card { background: white; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--color-border); transition: all 0.2s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .product-img { width: 100%; height: 180px; object-fit: cover; }
        .product-info { padding: var(--space-6); }
        
        .status-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: #FEF3C7; color: #92400E; }
        .status-approved { background: #D1FAE5; color: #065F46; }

        /* Modal Styles */
        .modal-backdrop { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); 
            z-index: 2000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(8px);
        }
        .modal { 
            background: white; 
            width: 95%; 
            max-width: 800px; 
            max-height: 90vh; 
            overflow-y: auto; 
            border-radius: var(--radius-xl); 
            padding: var(--space-10); 
            box-shadow: var(--shadow-2xl);
            animation: slideUp 0.3s ease;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6); }
        .plan-item { background: var(--color-bg); padding: var(--space-4); border-radius: var(--radius-md); margin-bottom: var(--space-4); position: relative; }
        .remove-plan { position: absolute; top: 10px; right: 10px; color: var(--color-danger); cursor: pointer; }
    </style>
</head>
<body>

    <aside class="vendor-sidebar">
        <div class="vendor-logo"><span>RentEase</span><span class="vendor-badge">VENDOR</span></div>
        <nav class="nav-list">
            <a href="/pages/vendor/dashboard.html" class="nav-item">📊 Overview</a>
            <a href="/pages/vendor/products.html" class="nav-item active">🪑 My Products</a>
            <a href="/pages/vendor/orders.html" class="nav-item">📦 Sales & Orders</a>
            <a href="/pages/profile.html" class="nav-item" style="margin-top: var(--space-12); border-top: 1px solid rgba(255,255,255,0.1); padding-top: var(--space-4);">⚙️ Profile Settings</a>
        </nav>
        <div style="padding: 0 var(--space-6) var(--space-6);">
            <button class="btn btn-outline" style="width: 100%; border-color: rgba(255,255,255,0.2); color: white;" onclick="Auth.logout()">Logout</button>
        </div>
    </aside>

    <main class="vendor-main">
        <div class="flex-between mb-12">
            <div>
                <h1 style="font-family: var(--font-display);">My Inventory</h1>
                <p class="text-muted">Manage your listed products and track approval status.</p>
            </div>
            <button class="btn btn-primary" onclick="showAddModal()">+ Add New Product</button>
        </div>

        <div class="grid-4" id="productList">
            <!-- Skeletons -->
            <div class="skeleton" style="height: 300px;"></div>
            <div class="skeleton" style="height: 300px;"></div>
            <div class="skeleton" style="height: 300px;"></div>
            <div class="skeleton" style="height: 300px;"></div>
        </div>
    </main>

    <!-- Add Product Modal -->
    <div class="modal-backdrop" id="addProductModal">
        <div class="modal">
            <div class="flex-between mb-8">
                <h2>Add New Product</h2>
                <button class="btn btn-ghost" onclick="hideAddModal()">✕</button>
            </div>

            <form id="productForm" onsubmit="handleProductSubmit(event)">
                <div class="form-grid mb-6">
                    <div>
                        <label class="label">Product Name*</label>
                        <input type="text" name="name" class="input" required placeholder="e.g. Premium Velvet Sofa">
                    </div>
                    <div>
                        <label class="label">Brand*</label>
                        <input type="text" name="brand" class="input" required placeholder="e.g. UrbanLadder">
                    </div>
                    <div>
                        <label class="label">Category*</label>
                        <select name="category" id="categorySelect" class="input" required>
                            <option value="">Select Category</option>
                        </select>
                    </div>
                    <div>
                        <label class="label">Condition*</label>
                        <select name="condition" class="input" required>
                            <option value="new">New</option>
                            <option value="like-new">Like New</option>
                            <option value="good">Good</option>
                        </select>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="label">Short Description*</label>
                    <input type="text" name="shortDescription" class="input" required maxlength="200" placeholder="A brief one-liner summary">
                </div>

                <div class="mb-6">
                    <label class="label">Detailed Description*</label>
                    <textarea name="description" class="input" required rows="4" placeholder="Describe the material, comfort, and other details..."></textarea>
                </div>

                <div class="form-grid mb-6">
                    <div>
                        <label class="label">Image URL* (comma separated)</label>
                        <input type="text" name="images" class="input" required placeholder="https://image1.jpg, https://image2.jpg">
                    </div>
                    <div>
                        <label class="label">Security Deposit (₹)*</label>
                        <input type="number" name="securityDeposit" class="input" required min="0">
                    </div>
                    <div>
                        <label class="label">Total Units*</label>
                        <input type="number" name="totalUnits" class="input" required min="1">
                    </div>
                </div>

                <div class="mb-8">
                    <div class="flex-between mb-4">
                        <label class="label">Rental Plans*</label>
                        <button type="button" class="btn btn-outline btn-sm" onclick="addPlanField()">+ Add Plan</button>
                    </div>
                    <div id="plansContainer">
                        <!-- Plans will be added here -->
                    </div>
                </div>

                <div class="flex-end gap-4 border-top pt-8">
                    <button type="button" class="btn btn-ghost" onclick="hideAddModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">List Product</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/toast.js"></script>
    <script src="../../js/loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        async function fetchProducts() {
            try {
                const res = await API.get('/vendor/products');
                const products = res.data.products;
                const list = document.getElementById('productList');
                
                if (products.length === 0) {
                    list.innerHTML = '<div class="col-span-4 text-center py-20 text-muted">No products found. Start by adding one!</div>';
                    return;
                }

                list.innerHTML = products.map(p => `
                    <div class="product-card">
                        <img src="${p.images[0]}" class="product-img">
                        <div class="product-info">
                            <div class="flex-between mb-2">
                                <span class="status-badge ${p.isApproved ? 'status-approved' : 'status-pending'}">
                                    ${p.isApproved ? 'Approved' : 'Pending Approval'}
                                </span>
                                <span class="text-muted small">ID: ${p._id.slice(-6)}</span>
                            </div>
                            <h3 class="mb-2" style="font-size: 1.1rem;">${p.name}</h3>
                            <div class="text-primary font-bold mb-4">₹${p.rentalPlans[0].monthlyPrice}/mo</div>
                            <div class="flex-start gap-2">
                                <button class="btn btn-outline btn-sm" onclick="editProduct('${p._id}')">Edit</button>
                                <button class="btn btn-ghost btn-sm text-danger" onclick="deleteProduct('${p._id}')">Delete</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                Toast.error('Failed to load products');
            }
        }

        function showAddModal() {
            document.getElementById('productForm').reset();
            document.getElementById('plansContainer').innerHTML = '';
            addPlanField(); // Add at least one plan by default
            fetchCategories();
            document.getElementById('addProductModal').style.display = 'flex';
        }

        function hideAddModal() {
            document.getElementById('addProductModal').style.display = 'none';
        }

        async function fetchCategories() {
            try {
                const res = await API.get('/products/categories/all');
                const select = document.getElementById('categorySelect');
                const categories = res.data.categories;
                
                select.innerHTML = '<option value="">Select Category</option>' + 
                    categories.map(c => `<option value="${c._id}">${c.name}</option>`).join('');
            } catch (err) {
                console.error('Failed to load categories');
            }
        }

        function addPlanField() {
            const container = document.getElementById('plansContainer');
            const div = document.createElement('div');
            div.className = 'plan-item animate-fade-in';
            div.innerHTML = `
                <div class="remove-plan" onclick="this.parentElement.remove()">✕</div>
                <div class="form-grid">
                    <div>
                        <label class="label" style="font-size: 0.75rem;">Duration (Months)</label>
                        <input type="number" name="duration" class="input" required min="1" placeholder="e.g. 3">
                    </div>
                    <div>
                        <label class="label" style="font-size: 0.75rem;">Monthly Price (₹)</label>
                        <input type="number" name="monthlyPrice" class="input" required min="1" placeholder="e.g. 599">
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        async function handleProductSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'Listing...';

            try {
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                
                // Process images
                data.images = data.images.split(',').map(img => img.trim()).filter(img => img !== '');
                
                // Process plans
                const durations = formData.getAll('duration');
                const prices = formData.getAll('monthlyPrice');
                data.rentalPlans = durations.map((d, i) => ({
                    duration: parseInt(d),
                    label: d + ' Months',
                    monthlyPrice: parseInt(prices[i]),
                    totalPrice: parseInt(d) * parseInt(prices[i])
                }));

                // Process numbers
                data.securityDeposit = parseInt(data.securityDeposit);
                data.totalUnits = parseInt(data.totalUnits);
                data.availableUnits = data.totalUnits;

                await API.post('/vendor/products', data);
                Toast.success('Product listed! Awaiting admin approval.');
                hideAddModal();
                fetchProducts();
            } catch (err) {
                Toast.error(err.message || 'Failed to list product');
            } finally {
                btn.disabled = false;
                btn.innerText = 'List Product';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            Auth.init();
            fetchProducts();
        });
    </script>
</body>
</html>
