<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental History | RentEase</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <style>
        body { background: var(--color-bg); display: flex; min-height: 100vh; }
        
        /* Dashboard Sidebar - Premium SaaS Style */
        .dashboard-sidebar { 
            width: var(--sidebar-width); 
            background: var(--color-primary-dark); 
            display: flex; 
            flex-direction: column; 
            position: fixed; 
            height: 100vh; 
            z-index: var(--z-sticky); 
            color: white;
            padding: var(--space-8) 0;
            transition: all var(--transition-base);
        }

        .user-profile-summary { 
            padding: 0 var(--space-8) var(--space-8); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            margin-bottom: var(--space-8); 
        }

        .avatar-circle { 
            width: 56px; 
            height: 56px; 
            border-radius: var(--radius-lg); 
            background: var(--color-accent); 
            color: var(--color-primary-dark); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            font-size: 1.25rem;
            margin-bottom: var(--space-4); 
            box-shadow: var(--shadow-glow);
        }

        .nav-list { list-style: none; flex-grow: 1; padding: 0 var(--space-4); }
        
        .nav-item { 
            display: flex; 
            align-items: center; 
            gap: var(--space-4); 
            padding: var(--space-4) var(--space-6); 
            color: rgba(255,255,255,0.6); 
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            margin-bottom: var(--space-1);
            font-weight: 500;
        }

        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--color-accent); color: var(--color-primary-dark); box-shadow: var(--shadow-md); }

        .dashboard-main { 
            margin-left: var(--sidebar-width); 
            flex-grow: 1; 
            padding: var(--space-12); 
            max-width: 1400px;
        }

        /* Stats Bar */
        .summary-stats { display: flex; gap: var(--space-6); margin-bottom: var(--space-8); }
        .summary-item { background: white; padding: var(--space-6); border-radius: var(--radius-lg); border: 1px solid var(--color-border); flex: 1; }
        .summary-val { font-size: 1.5rem; font-weight: 700; color: var(--color-primary); }

        /* History Cards */
        .history-card { background: white; padding: var(--space-8); border-radius: var(--radius-xl); border: 1px solid var(--color-border); margin-bottom: var(--space-6); transition: transform 0.2s; }
        .history-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        
        .history-grid { display: grid; grid-template-columns: 80px 1fr auto; gap: var(--space-6); align-items: start; }
        .history-img { width: 80px; height: 80px; object-fit: cover; border-radius: var(--radius-lg); }

        /* Review Modal */
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal { background: white; width: 90%; max-width: 450px; border-radius: var(--radius-xl); padding: var(--space-10); }
        .stars-row { display: flex; gap: 8px; font-size: 1.5rem; margin: var(--space-4) 0; }
        .star { cursor: pointer; color: var(--color-border); transition: color 0.2s; }
        .star.selected, .star:hover { color: #f4a623; }

        @media (max-width: 768px) {
            .dashboard-main { margin-left: 0; padding: var(--space-6); }
            .history-grid { grid-template-columns: 1fr; text-align: center; justify-items: center; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="dashboard-sidebar" id="sidebar">
        <!-- Profile summary will be injected via JS -->
    </aside>

    <main class="dashboard-main">
        <div class="flex-between mb-8">
            <h1 style="font-family: var(--font-display);">Rental History <span id="historyCount" class="badge badge-outline" style="vertical-align: middle; margin-left: 12px;">0</span></h1>
            <div class="flex-start gap-4">
                <select id="yearFilter" onchange="fetchHistory()">
                    <option value="">All Years</option>
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                </select>
            </div>
        </div>

        <!-- Summary Stats -->
        <div class="summary-stats animate-fade-in">
            <div class="summary-item">
                <div class="text-muted" style="font-size: 0.75rem;">Total Rentals</div>
                <div class="summary-val" id="statTotal">0</div>
            </div>
            <div class="summary-item">
                <div class="text-muted" style="font-size: 0.75rem;">Total Spent</div>
                <div class="summary-val" id="statSpent">₹0</div>
            </div>
            <div class="summary-item">
                <div class="text-muted" style="font-size: 0.75rem;">Favorite Category</div>
                <div class="summary-val" id="statFav">None</div>
            </div>
            <div class="summary-item">
                <div class="text-muted" style="font-size: 0.75rem;">Member Since</div>
                <div class="summary-val" id="statMember">May 2026</div>
            </div>
        </div>

        <div id="historyList">
            <!-- Skeletons -->
            <div class="skeleton mb-6" style="height: 180px; width: 100%;"></div>
            <div class="skeleton mb-6" style="height: 180px; width: 100%;"></div>
        </div>

        <div class="flex-center py-10" id="pagination">
            <button class="btn btn-outline" id="loadMoreBtn" style="display:none;" onclick="loadMore()">Load More</button>
        </div>
    </main>

    <!-- Review Modal -->
    <div class="modal-backdrop" id="reviewModalBackdrop">
        <div class="modal">
            <h3>Leave a Review</h3>
            <p class="text-muted mb-6" id="reviewProdName">Product Name</p>
            
            <div class="stars-row" id="starsContainer">
                <span class="star" data-val="1">★</span>
                <span class="star" data-val="2">★</span>
                <span class="star" data-val="3">★</span>
                <span class="star" data-val="4">★</span>
                <span class="star" data-val="5">★</span>
            </div>
            
            <textarea id="reviewText" placeholder="How was your experience with this item?" rows="4" class="w-100" style="width: 100%; border: 1px solid var(--color-border); border-radius: 8px; padding: 12px;"></textarea>
            
            <div class="flex-end gap-4 mt-8">
                <button class="btn btn-ghost" onclick="closeReviewModal()">Cancel</button>
                <button class="btn btn-primary" id="submitReviewBtn">Post Review</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/loader.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/utils.js"></script>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        let selectedRating = 0;

        async function fetchHistory(append = false) {
            const year = document.getElementById('yearFilter').value;
            try {
                const res = await API.get(`/users/rentals/history?page=${currentPage}&year=${year}`);
                const data = res.data;
                
                totalPages = data.totalPages;
                document.getElementById('historyCount').innerText = data.totalCount;
                document.getElementById('statTotal').innerText = data.totalCount;
                
                // Calc stats
                let totalSpent = data.rentals.reduce((sum, r) => sum + r.totalAmountPaid, 0);
                document.getElementById('statSpent').innerText = `₹${totalSpent.toLocaleString()}`;
                
                const cats = data.rentals.map(r => r.product.category?.name).filter(Boolean);
                const fav = cats.sort((a,b) => cats.filter(v => v===a).length - cats.filter(v => v===b).length).pop();
                document.getElementById('statFav').innerText = fav || 'None';

                renderHistory(data.rentals, append);
                
                document.getElementById('loadMoreBtn').style.display = currentPage < totalPages ? 'block' : 'none';
            } catch (err) {}
        }

        function renderHistory(rentals, append) {
            const list = document.getElementById('historyList');
            if (!append) list.innerHTML = '';

            if (rentals.length === 0 && !append) {
                list.innerHTML = '<div class="text-center py-20 bg-white rounded-xl"><h3>No completed rentals found.</h3><a href="/pages/products.html" class="btn btn-primary mt-6">Explore Products</a></div>';
                return;
            }

            rentals.forEach(r => {
                const card = document.createElement('div');
                card.className = 'history-card animate-fade-in';
                card.innerHTML = `
                    <div class="history-grid">
                        <img src="${r.product.images[0]}" class="history-img">
                        <div class="flex-grow">
                            <div class="flex-start gap-3 mb-2">
                                <h3 style="margin-bottom: 0;">${r.product.name}</h3>
                                <span class="badge ${r.status === 'returned' ? 'badge-success' : 'badge-outline'}">${r.status.toUpperCase()}</span>
                            </div>
                            <div class="text-muted" style="font-size: 0.8rem;">${r.product.brand} · ${r.rentalPlan.label}</div>
                            <div class="mt-4" style="font-size: 0.85rem;">
                                📅 <strong>${new Date(r.startDate).toLocaleDateString()} – ${new Date(r.endDate).toLocaleDateString()}</strong>
                            </div>
                            <div class="mt-2 text-secondary" style="font-size: 0.8rem;">
                                💰 Total Paid: <strong>₹${r.totalAmountPaid.toLocaleString()}</strong> | Deposit: ${r.depositStatus === 'returned' ? '✅ Refunded' : '⏳ Held'}
                            </div>
                        </div>
                        <div class="flex-direction-column d-flex gap-2">
                            <button class="btn btn-primary btn-sm" onclick="rentAgain('${r.product._id}', '${r.rentalPlan.duration}')">Rent Again</button>
                            <button class="btn btn-outline btn-sm" onclick="openReviewModal('${r.product._id}', '${r.product.name}')">Leave Review</button>
                            <button class="btn btn-ghost btn-sm" onclick="Toast.info('Downloading receipt...')">Download Receipt</button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function loadMore() {
            currentPage++;
            fetchHistory(true);
        }

        // Review Logic
        function openReviewModal(id, name) {
            document.getElementById('reviewProdName').innerText = name;
            document.getElementById('reviewModalBackdrop').style.display = 'flex';
            selectedRating = 0;
            resetStars();
            
            document.getElementById('submitReviewBtn').onclick = () => {
                if (selectedRating === 0) return Toast.warning('Please select a rating');
                localStorage.setItem(`review_${id}`, JSON.stringify({
                    rating: selectedRating,
                    text: document.getElementById('reviewText').value,
                    date: new Date().toISOString()
                }));
                Toast.success('Thank you for your feedback!');
                closeReviewModal();
            };
        }

        function closeReviewModal() {
            document.getElementById('reviewModalBackdrop').style.display = 'none';
        }

        function resetStars() {
            document.querySelectorAll('.star').forEach(s => s.classList.remove('selected'));
        }

        function rentAgain(id, duration) {
            // Simplified: in real app, fetch product first
            Toast.info('Adding same plan to cart...');
            setTimeout(() => {
                window.location.href = `/pages/product-detail.html?id=${id}`;
            }, 1000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const user = Auth.getStoredUser();
            if (!user) { window.location.href = '/pages/login.html'; return; }
            
            // Init Sidebar
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = `
                <div class="user-profile-summary">
                    <div class="avatar-circle" id="userAvatar">${user.name.split(' ').map(n=>n[0]).join('').toUpperCase()}</div>
                    <div style="font-weight: 700; font-size: 1.1rem;">${user.name}</div>
                    <div style="font-size: 0.8125rem; opacity: 0.5;">${user.email}</div>
                </div>
                <nav class="nav-list">
                    <a href="/pages/dashboard.html" class="nav-item">🏠 Dashboard</a>
                    <a href="/pages/active-rentals.html" class="nav-item">🛋️ Active Rentals</a>
                    <a href="/pages/rental-history.html" class="nav-item active">📜 Rental History</a>
                    <a href="/pages/maintenance.html" class="nav-item">🛠️ Maintenance</a>
                    <a href="/pages/profile.html" class="nav-item">⚙️ Profile Settings</a>
                </nav>
                <div style="padding: 0 var(--space-6) var(--space-6);">
                    <button class="btn btn-outline" style="width: 100%; border-color: rgba(255,255,255,0.2); color: white;" onclick="Auth.logout()">Logout</button>
                </div>
            `;

            document.querySelectorAll('.star').forEach(s => {
                s.onclick = () => {
                    selectedRating = parseInt(s.dataset.val);
                    document.querySelectorAll('.star').forEach(star => {
                        star.classList.toggle('selected', parseInt(star.dataset.val) <= selectedRating);
                    });
                };
            });

            Auth.init();
            fetchHistory();
        });
    </script>
</body>
</html>
