<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | RentEase Smart Living</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .smart-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 24px;
            border-radius: var(--radius-xl);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            display: inline-block;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .metric-item {
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: var(--radius-lg);
        }
    </style>
</head>
<body class="bg-surface-2">
    <div class="container py-12">
        <header class="flex-between mb-12">
            <div>
                <h1 style="font-size: 2rem;">Welcome Back, <span id="userName">User</span></h1>
                <p class="text-secondary">Track your rentals and smart appliances.</p>
            </div>
            <div id="subscriptionBadge" class="badge badge-accent">Basic Plan</div>
        </header>

        <section class="mb-16">
            <h2 class="mb-6">Smart Appliances</h2>
            <div class="grid-3" id="smartContainer">
                <!-- Smart cards will load here -->
                <div class="smart-card">
                    <div class="flex-between">
                        <span style="font-size: 1.5rem;">❄️ Smart Fridge</span>
                        <span class="status-pill">ONLINE</span>
                    </div>
                    <div class="metric-grid">
                        <div class="metric-item">
                            <div style="opacity: 0.6; font-size: 0.75rem;">Temperature</div>
                            <div style="font-size: 1.25rem; font-weight: 700;">4°C</div>
                        </div>
                        <div class="metric-item">
                            <div style="opacity: 0.6; font-size: 0.75rem;">Usage</div>
                            <div style="font-size: 1.25rem; font-weight: 700;">120 kWh</div>
                        </div>
                    </div>
                    <div style="height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;">
                        <div style="width: 85%; height: 100%; background: var(--color-accent); border-radius: 2px;"></div>
                    </div>
                    <div style="font-size: 0.75rem; opacity: 0.6;">Health Score: 92%</div>
                </div>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            Auth.init();
            const user = Auth.getUser();
            if (!user) location.href = '/pages/login.html';
            
            document.getElementById('userName').textContent = user.name;
            document.getElementById('subscriptionBadge').textContent = `${user.subscription?.tier || 'Basic'} Plan`;
        });
    </script>
</body>
</html>
